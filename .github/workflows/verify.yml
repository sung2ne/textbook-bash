name: Bash Syntax Check
on: [push, pull_request]
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck 설치
        run: sudo apt-get install -y shellcheck
      - name: Bash 문법 검사 (bash -n)
        run: find . -name '*.sh' -not -path './.git/*' | xargs -r bash -n
      - name: ShellCheck 정적 분석
        run: find . -name '*.sh' -not -path './.git/*' | xargs -r shellcheck --severity=error
