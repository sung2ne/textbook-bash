name: ShellCheck

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: ShellCheck 설치
        run: sudo apt-get install -y shellcheck

      - name: ShellCheck 실행
        run: |
          find . -name "*.sh" -not -path "./.git/*" | \
            xargs shellcheck --severity=warning